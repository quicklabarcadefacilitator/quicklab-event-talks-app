<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Summit 2026</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }
        #search {
            padding: 1rem 0;
            background: #f4f4f4;
            text-align: center;
        }
        #search input {
            padding: 0.5rem;
            width: 50%;
        }
        #schedule {
            margin-top: 1rem;
        }
        .talk {
            background: #fff;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 5px solid #333;
        }
        .talk h2 {
            margin-top: 0;
        }
        .talk .time {
            font-weight: bold;
        }
        .talk .speakers {
            font-style: italic;
        }
        .talk .categories {
            margin-top: 0.5rem;
        }
        .talk .categories span {
            background: #333;
            color: #fff;
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Tech Summit 2026</h1>
        </div>
    </header>
    <div id="search" class="container">
        <input type="text" id="searchInput" placeholder="Search by category...">
    </div>
    <div id="schedule" class="container">
    </div>

    <script>
        const talks = [
            {
                "title": "The Future of JavaScript",
                "speakers": ["Jane Doe"],
                "categories": ["JavaScript", "Web Development"],
                "duration": 60,
                "description": "A deep dive into the future of JavaScript, including new features and what to expect in the coming years."
            },
            {
                "title": "Building Scalable APIs with Node.js",
                "speakers": ["John Smith"],
                "categories": ["Node.js", "APIs", "Backend"],
                "duration": 60,
                "description": "Learn how to build robust and scalable APIs using Node.js and Express."
            },
            {
                "title": "Frontend Frameworks in 2026",
                "speakers": ["Peter Jones", "Mary Williams"],
                "categories": ["Frontend", "Web Development"],
                "duration": 60,
                "description": "A comparative look at the most popular frontend frameworks and their evolution."
            },
            {
                "title": "The Rise of AI in Software Development",
                "speakers": ["Susan Miller"],
                "categories": ["AI", "Machine Learning"],
                "duration": 60,
                "description": "How AI is changing the landscape of software development and what it means for developers."
            },
            {
                "title": "DevOps for Modern Applications",
                "speakers": ["David Brown"],
                "categories": ["DevOps", "CI/CD"],
                "duration": 60,
                "description": "Best practices for implementing DevOps pipelines for modern applications."
            },
            {
                "title": "Cybersecurity in the Cloud",
                "speakers": ["Laura Wilson"],
                "categories": ["Cybersecurity", "Cloud"],
                "duration": 60,
                "description": "An overview of the latest security threats in cloud computing and how to mitigate them."
            }
        ];

        const scheduleContainer = document.getElementById('schedule');
        const searchInput = document.getElementById('searchInput');

        function renderSchedule(filteredTalks) {
            scheduleContainer.innerHTML = '';
            let startTime = new Date('2026-01-01T10:00:00');
            let talkCounter = 0;

            filteredTalks.forEach((talk, index) => {
                const talkElement = document.createElement('div');
                talkElement.classList.add('talk');

                const endTime = new Date(startTime.getTime() + talk.duration * 60000);

                talkElement.innerHTML = `
                    <div class="time">${formatTime(startTime)} - ${formatTime(endTime)}</div>
                    <h2>${talk.title}</h2>
                    <div class="speakers">${talk.speakers.join(', ')}</div>
                    <p>${talk.description}</p>
                    <div class="categories">
                        ${talk.categories.map(category => `<span>${category}</span>`).join('')}
                    </div>
                `;
                scheduleContainer.appendChild(talkElement);

                startTime = new Date(endTime.getTime() + 10 * 60000);
                talkCounter++;

                if (talkCounter === 3) {
                    const lunchElement = document.createElement('div');
                    lunchElement.classList.add('talk');
                    lunchElement.innerHTML = `
                        <div class="time">${formatTime(startTime)} - ${formatTime(new Date(startTime.getTime() + 60 * 60000))}</div>
                        <h2>Lunch Break</h2>
                    `;
                    scheduleContainer.appendChild(lunchElement);
                    startTime = new Date(startTime.getTime() + 60 * 60000 + 10 * 60000);
                }
            });
        }

        function formatTime(date) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function filterTalks() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredTalks = talks.filter(talk => {
                return talk.categories.some(category => category.toLowerCase().includes(searchTerm));
            });
            renderSchedule(filteredTalks);
        }

        searchInput.addEventListener('input', filterTalks);

        renderSchedule(talks);
    </script>
</body>
</html>
