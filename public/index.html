<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Conference 2026</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }

    .container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 1rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 1rem;
    }

    h1 {
      color: #007BFF;
    }

    .search-container {
      text-align: center;
      margin-bottom: 2rem;
    }

    #category-search {
      padding: 0.5rem;
      width: 50%;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    .schedule-container {
      display: grid;
      grid-gap: 1.5rem;
    }

    .schedule-item {
      background: #fff;
      padding: 1.5rem;
      border-left: 5px solid #007BFF;
      border-radius: 5px;
      transition: all 0.3s ease-in-out;
    }

    .schedule-item.lunch {
      border-left-color: #28a745;
    }

    .schedule-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px rgba(0,0,0,0.1);
    }

    .schedule-time {
      font-weight: bold;
      font-size: 1.1rem;
      color: #007BFF;
    }

    .schedule-item.lunch .schedule-time {
      color: #28a745;
    }

    .talk-title {
      font-size: 1.5rem;
      margin: 0.5rem 0;
    }

    .talk-speakers {
      font-style: italic;
      color: #666;
      margin-bottom: 1rem;
    }

    .talk-categories {
      margin-top: 1rem;
    }

    .category-tag {
      display: inline-block;
      background: #007BFF;
      color: #fff;
      padding: 0.3rem 0.7rem;
      border-radius: 15px;
      font-size: 0.8rem;
      margin-right: 0.5rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Tech Conference 2026</h1>
      <p>A one-day event filled with technical talks.</p>
    </header>

    <div class="search-container">
      <label for="category-search">Filter by category:</label>
      <input type="text" id="category-search" placeholder="e.g., AI, JavaScript...">
    </div>

    <div id="schedule" class="schedule-container">
      <!-- Schedule will be dynamically generated here -->
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const scheduleContainer = document.getElementById('schedule');
      const searchInput = document.getElementById('category-search');
      
      const talks = [
        {
          "title": "The Future of Artificial Intelligence",
          "speakers": ["Jane Doe"],
          "categories": ["AI", "Machine Learning"],
          "description": "A deep dive into the future of AI and its potential impact on society."
        },
        {
          "title": "Modern JavaScript Frameworks",
          "speakers": ["John Smith", "Emily White"],
          "categories": ["JavaScript", "Web Development"],
          "description": "An overview of the most popular JavaScript frameworks in 2026."
        },
        {
          "title": "Cybersecurity in the Cloud",
          "speakers": ["Alex Johnson"],
          "categories": ["Cybersecurity", "Cloud"],
          "description": "Best practices for securing your applications and data in the cloud."
        },
        {
          "title": "The Rise of Quantum Computing",
          "speakers": ["Maria Garcia"],
          "categories": ["Quantum Computing", "Future Tech"],
          "description": "An introduction to the principles of quantum computing and its potential applications."
        },
        {
          "title": "Building Scalable APIs with GraphQL",
          "speakers": ["David Lee", "Sarah Brown"],
          "categories": ["APIs", "GraphQL", "Web Development"],
          "description": "Learn how to build flexible and scalable APIs with GraphQL."
        },
        {
          "title": "DevOps Culture and Practice",
          "speakers": ["Chris Green"],
          "categories": ["DevOps", "Culture"],
          "description": "A talk on how to foster a successful DevOps culture in your organization."
        }
      ];

      generateSchedule(talks);

      // Search functionality
      searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const allTalkItems = document.querySelectorAll('.schedule-item:not(.lunch)');

        allTalkItems.forEach(talkItem => {
          const categories = talkItem.dataset.categories.toLowerCase();
          if (categories.includes(searchTerm)) {
            talkItem.classList.remove('hidden');
          } else {
            talkItem.classList.add('hidden');
          }
        });
      });

      // Function to generate the schedule
      function generateSchedule(talksData) {
        scheduleContainer.innerHTML = ''; // Clear existing schedule
        let currentTime = new Date();
        currentTime.setHours(10, 0, 0, 0); // Event starts at 10:00 AM

        talksData.forEach((talk, index) => {
          const startTime = formatTime(currentTime);
          const talkDuration = 60; // 60 minutes
          currentTime.setMinutes(currentTime.getMinutes() + talkDuration);
          const endTime = formatTime(currentTime);

          const talkElement = document.createElement('div');
          talkElement.classList.add('schedule-item');
          talkElement.dataset.categories = talk.categories.join(',');
          talkElement.innerHTML = `
            <div class="schedule-time">${startTime} - ${endTime}</div>
            <h2 class="talk-title">${talk.title}</h2>
            <div class="talk-speakers">By: ${talk.speakers.join(', ')}</div>
            <p>${talk.description}</p>
            <div class="talk-categories">
              ${talk.categories.map(cat => `<span class="category-tag">${cat}</span>`).join('')}
            </div>
          `;
          scheduleContainer.appendChild(talkElement);

          // Add lunch break after the 3rd talk
          if (index === 2) {
            const lunchStartTime = formatTime(currentTime);
            currentTime.setMinutes(currentTime.getMinutes() + 60); // 1-hour lunch
            const lunchEndTime = formatTime(currentTime);
            const lunchElement = document.createElement('div');
            lunchElement.classList.add('schedule-item', 'lunch');
            lunchElement.innerHTML = `
              <div class="schedule-time">${lunchStartTime} - ${lunchEndTime}</div>
              <h2 class="talk-title">Lunch Break</h2>
            `;
            scheduleContainer.appendChild(lunchElement);
          }

          // Add 10-minute transition time
          if(index < talksData.length -1) {
            currentTime.setMinutes(currentTime.getMinutes() + 10);
          }

        });
      }

      // Helper function to format time
      function formatTime(date) {
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
      }
    });
  </script>
</body>
</html>
